<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colmena — The swarm learns where to sting.</title>
  <meta name="description" content="The swarm learns where to sting.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:title" content="Colmena">
  <meta property="og:description" content="The swarm learns where to sting.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://colmena.space">
  <meta property="og:image" content="https://colmena.space/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Google Fonts: Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --gold-dark: #D4A017;
      --amber: #FFB800;
      --bone: #F5F0E8;
      --amber-muted: #B8860B;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100%;
      background: var(--black);
      font-family: 'Playfair Display', serif;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      color: var(--bone);
      letter-spacing: 0.3em;
      margin-right: -0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .title.visible {
      opacity: 1;
      text-shadow: 0 0 30px rgba(212,160,23,0.15), 0 0 60px rgba(212,160,23,0.08);
    }

    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--amber-muted);
      letter-spacing: 0.05em;
      margin-top: 1.2rem;
      min-height: 1.5em;
      text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
    }

    /* Hero takes exactly one viewport */
    .hero-spacer {
      height: 100vh;
      position: relative;
    }

    /* Scroll indicator */
    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    .scroll-hint.visible {
      opacity: 0.5;
    }
    .scroll-hint svg {
      width: 24px;
      height: 24px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* Manifesto section */
    .manifesto {
      position: relative;
      z-index: 4;
      background: transparent;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }
    /* Gradient fade from transparent to black — particles visible through top */
    .manifesto::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40vh;
      background: linear-gradient(to bottom, transparent, var(--black) 80%);
      pointer-events: none;
      z-index: -1;
    }
    .manifesto::after {
      content: '';
      position: absolute;
      top: 40vh;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--black);
      z-index: -1;
    }

    .manifesto-line {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      color: var(--bone);
      letter-spacing: 0.05em;
      margin-bottom: 1.8rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
    }
    .manifesto-line.revealed {
      opacity: 0.85;
      transform: translateY(0);
    }
    .manifesto-line.accent {
      color: var(--amber-muted);
      font-style: italic;
    }
    .manifesto-line.dim {
      color: rgba(245,240,232,0.4);
      font-size: clamp(0.85rem, 2vw, 1.1rem);
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.5rem;
      padding: 0.8rem 2rem;
      border: 1px solid rgba(212,160,23,0.3);
      color: var(--amber-muted);
      text-decoration: none;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.08em;
      transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }
    .repo-link.revealed {
      opacity: 1;
      transform: translateY(0);
    }
    .repo-link:hover {
      border-color: var(--gold-dark);
      color: var(--bone);
      box-shadow: 0 0 20px rgba(212,160,23,0.15);
    }
    .repo-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <canvas id="swarm"></canvas>
  <div class="content">
    <h1 class="title" id="title">COLMENA</h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-hint" id="scrollHint">
    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(212,160,23,0.6)" stroke-width="2">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <!-- Hero spacer (canvas is fixed, this makes room for scroll) -->
  <div class="hero-spacer"></div>

  <!-- Manifesto -->
  <section class="manifesto">
    <div class="manifesto-line">Trust firewall for AI coding agents.</div>
    <div class="manifesto-line accent">One operator. Many agents. Full control.</div>
    <div class="manifesto-line">Built in Rust. Local-first. Zero cloud dependencies.</div>
    <div class="manifesto-line dim">&lt; 15ms latency. Every tool call evaluated.</div>
    <div class="manifesto-line accent" style="margin-top: 1rem;">The hive defends the colony.</div>
    <a href="https://github.com/4rth4s/colmena" target="_blank" rel="noopener" class="repo-link">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      View on GitHub
    </a>
  </section>

  <script>
    // === PERLIN NOISE ===
    const Perlin = (() => {
      const permutation = [];
      for (let i = 0; i < 256; i++) permutation[i] = i;
      for (let i = 255; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
      }
      const p = [...permutation, ...permutation];
      function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      function lerp(a, b, t) { return a + t * (b - a); }
      function grad(hash, x, y) {
        const h = hash & 3;
        return (h < 2 ? x : -x) + (h === 0 || h === 3 ? y : -y);
      }
      return {
        noise2D(x, y) {
          const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
          const xf = x - Math.floor(x), yf = y - Math.floor(y);
          const u = fade(xf), v = fade(yf);
          const aa = p[p[xi] + yi], ab = p[p[xi] + yi + 1];
          const ba = p[p[xi + 1] + yi], bb = p[p[xi + 1] + yi + 1];
          return lerp(
            lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
            lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v
          );
        }
      };
    })();

    // === CANVAS SETUP ===
    const canvas = document.getElementById('swarm');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY, hexSize;
    // Scale factor for glow/effects relative to hex size
    let glowScale = 1;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
      // Fit hexagon inside viewport with generous margin
      const margin = Math.min(W, H) * 0.08; // 8% of smallest dimension
      const maxW = (W - margin * 2) / 2;
      const maxH = (H - margin * 2) / 2;
      // Hex pointy-top: width = size*sqrt(3), height = size*2
      const sizeByW = maxW / (Math.sqrt(3) / 2);
      const sizeByH = maxH;
      hexSize = Math.min(sizeByW, sizeByH);
      // Scale effects proportionally (reference: hexSize ~300 on 1080p)
      glowScale = Math.max(hexSize / 300, 0.5);
    }
    resize();
    window.addEventListener('resize', resize);

    // === CONFIG ===
    const isMobile = window.innerWidth < 768 || window.innerHeight < 500;
    const PARTICLE_COUNT = isMobile ? 100 : 280;
    const MOUSE_REPEL_RADIUS = isMobile ? 60 : 100;

    // === PHASES ===
    const Phase = { DARK: 0, SPAWN: 1, CONVERGE: 2, REVEAL_TITLE: 3, REVEAL_TAGLINE: 4, STEADY: 5 };
    let phase = Phase.DARK;
    const startTime = performance.now();
    function elapsed() { return (performance.now() - startTime) / 1000; }

    // === MOUSE / TOUCH ===
    let mouseX = -9999, mouseY = -9999;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });
    // Touch support for mobile
    document.addEventListener('touchmove', e => {
      const touch = e.touches[0];
      mouseX = touch.clientX; mouseY = touch.clientY;
    }, { passive: true });
    document.addEventListener('touchend', () => { mouseX = -9999; mouseY = -9999; });
    // Gyroscope for mobile (subtle interaction)
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', e => {
        if (e.gamma !== null && e.beta !== null) {
          mouseX = centerX + (e.gamma / 90) * (W / 4);
          mouseY = centerY + ((e.beta - 45) / 90) * (H / 4);
        }
      });
    }

    // === HEXAGON VERTICES ===
    function getHexVertices(size, cx, cy) {
      const verts = [];
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 2;
        verts.push({ x: cx + Math.cos(a) * size, y: cy + Math.sin(a) * size });
      }
      return verts;
    }

    // Point on hexagon perimeter (0-1 maps to full loop)
    function hexPoint(t, size, cx, cy) {
      t = ((t % 1) + 1) % 1;
      const seg = t * 6;
      const idx = Math.floor(seg);
      const frac = seg - idx;
      const verts = getHexVertices(size, cx, cy);
      const a = verts[idx % 6], b = verts[(idx + 1) % 6];
      return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
    }

    // === PARTICLE ===
    // All particles start free. During CONVERGE some get "captured" by the hex edges.
    class Particle {
      constructor() {
        this.alive = false;
        this.captured = false;
        this.noiseX = Math.random() * 1000;
        this.noiseY = Math.random() * 1000;
        this.trail = [];
        this.maxTrail = 8;

        // Depth layer: 20% foreground, 50% mid, 30% background
        const layerRoll = Math.random();
        if (layerRoll < 0.2) {
          // Foreground: big, bright, slow (close to camera)
          this.size = 2.5 + Math.random() * 2;
          this.opacity = 0.7 + Math.random() * 0.3;
          this.speed = 0.2 + Math.random() * 0.4;
          this.layer = 'fg';
        } else if (layerRoll < 0.7) {
          // Mid: medium, normal
          this.size = 1.2 + Math.random() * 1.5;
          this.opacity = 0.5 + Math.random() * 0.4;
          this.speed = 0.4 + Math.random() * 0.6;
          this.layer = 'mid';
        } else {
          // Background: tiny, dim, fast (far from camera)
          this.size = 0.5 + Math.random() * 0.8;
          this.opacity = 0.2 + Math.random() * 0.3;
          this.speed = 0.6 + Math.random() * 1.0;
          this.layer = 'bg';
        }

        // Color: gold to amber
        const c = Math.random();
        this.r = Math.floor(200 + c * 55);
        this.g = Math.floor(150 + c * 40);
        this.b = Math.floor(15 + c * 15);

        // Orbit state (set when captured)
        this.orbitPos = 0;
        this.orbitSpeed = 0;
        this.orbitOffset = 0;

        // Spawn from edges
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0) { this.x = Math.random() * W; this.y = -10; }
        else if (edge === 1) { this.x = W + 10; this.y = Math.random() * H; }
        else if (edge === 2) { this.x = Math.random() * W; this.y = H + 10; }
        else { this.x = -10; this.y = Math.random() * H; }
        this.prevX = this.x;
        this.prevY = this.y;
      }

      // Find nearest point on hex perimeter and distance to it
      nearestHexParam() {
        let bestDist = Infinity, bestT = 0;
        // Sample 60 points around hex
        for (let i = 0; i < 60; i++) {
          const t = i / 60;
          const hp = hexPoint(t, hexSize, centerX, centerY);
          const dx = this.x - hp.x, dy = this.y - hp.y;
          const d = dx * dx + dy * dy;
          if (d < bestDist) { bestDist = d; bestT = t; }
        }
        return { dist: Math.sqrt(bestDist), t: bestT };
      }

      update(t) {
        if (!this.alive) return;
        if (this.captured) {
          this.trail.push({ x: this.x, y: this.y });
          if (this.trail.length > this.maxTrail) this.trail.shift();
        }
        this.prevX = this.x;
        this.prevY = this.y;

        if (this.captured) {
          // Orbit along hexagon edges — plasma flow
          this.orbitPos += this.orbitSpeed;
          const hp = hexPoint(this.orbitPos, hexSize, centerX, centerY);
          const nx = Perlin.noise2D(this.noiseX + t * 0.5, t * 0.3) * this.orbitOffset;
          const ny = Perlin.noise2D(this.noiseY + t * 0.5, t * 0.3) * this.orbitOffset;
          this.x = hp.x + nx;
          this.y = hp.y + ny;
          return; // no mouse repel or edge wrap for captured particles
        }

        // Free drift with Perlin noise
        const nx = Perlin.noise2D(this.noiseX + t * 0.3, this.noiseY) * 2;
        const ny = Perlin.noise2D(this.noiseY + t * 0.3, this.noiseX) * 2;
        this.x += nx * this.speed;
        this.y += ny * this.speed;

        // Attractor toward hex perimeter during convergence
        if (phase >= Phase.CONVERGE) {
          const ax = centerX - this.x, ay = centerY - this.y;
          const ad = Math.sqrt(ax * ax + ay * ay);
          if (ad > 0) {
            const strength = phase === Phase.CONVERGE
              ? Math.min((elapsed() - 2) / 2, 1) * 0.8
              : 0.1;
            this.x += (ax / ad) * strength;
            this.y += (ay / ad) * strength;
            // Tangential drift
            if (phase > Phase.CONVERGE) {
              this.x += (-ay / ad) * 0.3 * this.speed;
              this.y += (ax / ad) * 0.3 * this.speed;
            }
          }
        }

        // Mouse repulsion
        const dx = this.x - mouseX, dy = this.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_REPEL_RADIUS && dist > 0) {
          const force = (MOUSE_REPEL_RADIUS - dist) / MOUSE_REPEL_RADIUS;
          this.x += (dx / dist) * force * 4;
          this.y += (dy / dist) * force * 4;
        }

        // Edge wrapping
        const m = 60;
        if (this.x < -m) this.x = W + m;
        if (this.x > W + m) this.x = -m;
        if (this.y < -m) this.y = H + m;
        if (this.y > H + m) this.y = -m;
      }

      draw() {
        if (!this.alive) return;
        const col = `${this.r},${this.g},${this.b}`;

        // Only captured particles with enough trail history get trails
        if (this.captured && this.trail.length > 3) {
          for (let i = 1; i < this.trail.length; i++) {
            const alpha = (i / this.trail.length) * this.opacity * 0.5;
            ctx.beginPath();
            ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = `rgba(${col},${alpha})`;
            ctx.lineWidth = this.size * 0.6;
            ctx.stroke();
          }
        }

        // Particle dot with glow
        ctx.save();
        const glowMult = this.captured ? 1.2 : 0.7;
        ctx.shadowColor = `rgba(${col},${0.6 * glowMult})`;
        ctx.shadowBlur = this.size * (this.captured ? 10 : 5);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${col},${this.opacity})`;
        ctx.fill();
        ctx.restore();
      }
    }

    // === CREATE PARTICLES ===
    const particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    // How many particles should be captured at full charge
    const maxCaptured = Math.floor(PARTICLE_COUNT * 0.45);
    let capturedCount = 0;

    // === HEXAGON DRAW PROGRESS ===
    // Two beams trace simultaneously: one clockwise from top, one counter-clockwise
    // Each goes 0→3 (half the hex). Together they complete the full hexagon symmetrically.
    let drawProgressCW = 0;  // clockwise from vertex 0 (top): segments 0,1,2
    let drawProgressCCW = 0; // counter-clockwise from vertex 0: segments 5,4,3

    // === PLASMA BEAM — draws a segment as an energy ray ===
    // progress: 0→1 how much of this segment is drawn (point-by-point reveal)
    function drawPlasmaBeam(ax, ay, bx, by, progress, time) {
      if (progress < 0.005) return;

      // End point based on progress (partial segment)
      const endX = ax + (bx - ax) * progress;
      const endY = ay + (by - ay) * progress;

      // Intensity ramps up as progress grows
      const intensity = Math.min(progress * 1.5, 1);

      // Heartbeat
      const bt = time % 2.4;
      let beat = 0;
      if (bt < 0.15) beat = bt / 0.15;
      else if (bt < 0.3) beat = 1 - (bt - 0.15) / 0.15;
      else if (bt < 0.5) beat = (bt - 0.3) / 0.2;
      else if (bt < 0.8) beat = 1 - (bt - 0.5) / 0.3;
      const glow = intensity * (0.5 + 0.5 * beat);

      const dx = endX - ax, dy = endY - ay;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 2) return;
      const nx = -dy / len, ny = dx / len;
      const steps = Math.max(Math.floor(progress * 40), 4);

      // Fade factor: taper off at leading edge for soft tip
      function edgeFade(frac) {
        if (progress >= 1) return 1; // complete segment, no fade
        const tipZone = 0.15;
        if (frac > 1 - tipZone) return (1 - frac) / tipZone;
        return 1;
      }

      // --- Layer 1: Wide outer bloom (wavy) ---
      ctx.save();
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const frac = i / steps;
        const baseX = ax + dx * frac;
        const baseY = ay + dy * frac;
        const wobble = Perlin.noise2D(frac * 4 + time * 0.8, 10) * 8 * glowScale;
        const px = baseX + nx * wobble;
        const py = baseY + ny * wobble;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.shadowColor = `rgba(255,190,0,${glow * 0.6})`;
      ctx.shadowBlur = 60 * glowScale;
      ctx.strokeStyle = `rgba(212,160,23,${glow * 0.2})`;
      ctx.lineWidth = 16 * glowScale;
      ctx.stroke();
      ctx.restore();

      // --- Layer 2: Medium glow (wavy) ---
      ctx.save();
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const frac = i / steps;
        const baseX = ax + dx * frac;
        const baseY = ay + dy * frac;
        const wobble = Perlin.noise2D(frac * 5 + time * 1.2, 50) * 4 * glowScale;
        const px = baseX + nx * wobble;
        const py = baseY + ny * wobble;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.shadowColor = `rgba(255,200,50,${glow * 0.7})`;
      ctx.shadowBlur = 25 * glowScale;
      ctx.strokeStyle = `rgba(230,180,40,${glow * 0.45})`;
      ctx.lineWidth = 4 * glowScale;
      ctx.stroke();
      ctx.restore();

      // --- Layer 3: Bright thin core ---
      ctx.save();
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const frac = i / steps;
        const baseX = ax + dx * frac;
        const baseY = ay + dy * frac;
        const wobble = Perlin.noise2D(frac * 6 + time * 1.5, 100) * 2;
        const px = baseX + nx * wobble;
        const py = baseY + ny * wobble;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.shadowColor = `rgba(255,220,100,${glow})`;
      ctx.shadowBlur = 12;
      ctx.strokeStyle = `rgba(255,210,60,${glow * 0.9})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();

      // --- Spiral helix filaments (3 strands, tapered at tip) ---
      for (let s = 0; s < 3; s++) {
        ctx.save();
        ctx.lineCap = 'round';
        ctx.beginPath();
        const spiralPhase = s * (Math.PI * 2 / 3) + time * 2.5;
        for (let i = 0; i <= steps; i++) {
          const frac = i / steps;
          const baseX = ax + dx * frac;
          const baseY = ay + dy * frac;
          const amplitude = (16 + Perlin.noise2D(frac * 2 + time * 0.4, s * 100) * 10) * glowScale;
          const fade = edgeFade(frac);
          const helixOffset = Math.sin(frac * 14 + spiralPhase) * amplitude * intensity * fade;
          const px = baseX + nx * helixOffset;
          const py = baseY + ny * helixOffset;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.shadowColor = `rgba(255,200,50,${glow * 0.15})`;
        ctx.shadowBlur = 8;
        ctx.strokeStyle = `rgba(255,190,30,${glow * 0.15})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }
    }

    // === ENERGY FLARE at vertex — soft bloom with hot white center ===
    function drawVertexFlare(x, y, intensity, vertIdx) {
      if (intensity < 0.01) return;
      const t = elapsed();
      const bt = t % 2.4;
      let beat = 0;
      if (bt < 0.15) beat = bt / 0.15;
      else if (bt < 0.3) beat = 1 - (bt - 0.15) / 0.15;
      else if (bt < 0.5) beat = (bt - 0.3) / 0.2;
      else if (bt < 0.8) beat = 1 - (bt - 0.5) / 0.3;
      const glow = intensity * (0.5 + 0.5 * beat);
      const radius = 40 * intensity;

      // Layer 1: wide soft bloom
      ctx.save();
      const grad1 = ctx.createRadialGradient(x, y, 0, x, y, radius);
      grad1.addColorStop(0, `rgba(255,210,60,${glow * 0.35})`);
      grad1.addColorStop(0.3, `rgba(255,180,30,${glow * 0.1})`);
      grad1.addColorStop(1, `rgba(255,150,0,0)`);
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = grad1;
      ctx.fill();
      ctx.restore();

      // Layer 2: tighter warm glow
      ctx.save();
      const grad2 = ctx.createRadialGradient(x, y, 0, x, y, radius * 0.4);
      grad2.addColorStop(0, `rgba(255,230,120,${glow * 0.5})`);
      grad2.addColorStop(1, `rgba(255,200,50,0)`);
      ctx.beginPath();
      ctx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = grad2;
      ctx.fill();
      ctx.restore();

      // Layer 3: hot white-yellow core
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.shadowColor = `rgba(255,250,200,${glow})`;
      ctx.shadowBlur = 15;
      ctx.fillStyle = `rgba(255,248,220,${glow * 0.9})`;
      ctx.fill();
      ctx.restore();
    }

    // === SPARKS — ephemeral electric discharges along beams ===
    const sparks = [];
    const MAX_SPARKS = isMobile ? 8 : 15;

    function spawnSpark() {
      if (drawProgressCW < 0.3) return;
      // Pick a random point along drawn portions of hexagon
      const totalDrawn = drawProgressCW + drawProgressCCW;
      const pos = Math.random() * Math.min(totalDrawn, 6);
      const hp = hexPoint(pos / 6, hexSize, centerX, centerY);
      sparks.push({
        x: hp.x + (Math.random() - 0.5) * 10,
        y: hp.y + (Math.random() - 0.5) * 10,
        life: 1, // 1→0
        decay: 0.02 + Math.random() * 0.03,
        size: 1 + Math.random() * 2
      });
    }

    function updateAndDrawSparks() {
      // Spawn new sparks occasionally
      if (Math.random() < 0.15 && sparks.length < MAX_SPARKS) spawnSpark();

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.life -= s.decay;
        if (s.life <= 0) { sparks.splice(i, 1); continue; }

        ctx.save();
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
        ctx.shadowColor = `rgba(255,240,150,${s.life * 0.8})`;
        ctx.shadowBlur = 15;
        ctx.fillStyle = `rgba(255,230,100,${s.life})`;
        ctx.fill();
        ctx.restore();
      }
    }

    function drawHexSegments() {
      const verts = getHexVertices(hexSize, centerX, centerY);
      const t = elapsed();

      // CW segments: 0(top→topR), 1(topR→botR), 2(botR→bot)
      for (let i = 0; i < 3; i++) {
        const segProgress = Math.max(0, Math.min(drawProgressCW - i, 1));
        if (segProgress < 0.08) continue; // min threshold — no thin lines
        const a = verts[i], b = verts[(i + 1) % 6];
        drawPlasmaBeam(a.x, a.y, b.x, b.y, segProgress, t + i * 7);

        if (segProgress > 0.1)
          drawVertexFlare(a.x, a.y, Math.min(segProgress * 2, 1), i);
        if (segProgress >= 0.95)
          drawVertexFlare(b.x, b.y, Math.min((segProgress - 0.95) / 0.05, 1), i + 1);
      }

      // CCW segments: drawn in reverse — 5(top→topL), 4(topL→botL), 3(botL→bot)
      for (let i = 0; i < 3; i++) {
        const segProgress = Math.max(0, Math.min(drawProgressCCW - i, 1));
        if (segProgress < 0.08) continue; // min threshold
        const segIdx = (6 - i) % 6; // segments 5, 4, 3
        const a = verts[segIdx], b = verts[(segIdx - 1 + 6) % 6];
        drawPlasmaBeam(a.x, a.y, b.x, b.y, segProgress, t + (segIdx + 3) * 7);

        if (segProgress > 0.1)
          drawVertexFlare(a.x, a.y, Math.min(segProgress * 2, 1), segIdx);
        if (segProgress >= 0.95)
          drawVertexFlare(b.x, b.y, Math.min((segProgress - 0.95) / 0.05, 1), (segIdx - 1 + 6) % 6);
      }

      // Electric sparks
      updateAndDrawSparks();
    }

    // === TAGLINE TYPEWRITER ===
    function typeTagline() {
      const text = 'The swarm learns where to sting.';
      const el = document.getElementById('tagline');
      let i = 0;
      const interval = setInterval(() => {
        el.textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 50);
    }

    // === CAPTURE LOGIC ===
    // Capture 1-2 particles per frame near the current draw front
    function tryCaptureParticles() {
      if (capturedCount >= maxCaptured) return;
      const captureRadius = 50;
      let capturedThisFrame = 0;

      for (const p of particles) {
        if (p.captured || !p.alive) continue;
        if (capturedCount >= maxCaptured || capturedThisFrame >= 2) break;

        const nearest = p.nearestHexParam();
        if (nearest.dist < captureRadius) {
          p.captured = true;
          p.orbitPos = nearest.t;
          p.orbitSpeed = 0.0006 + Math.random() * 0.001;
          p.orbitOffset = (Math.random() - 0.5) * 10 * glowScale;
          p.maxTrail = 12;
          p.trail = [];
          // Snap position to hex edge immediately (no trail from old position)
          const snapPt = hexPoint(nearest.t, hexSize, centerX, centerY);
          p.x = snapPt.x;
          p.y = snapPt.y;
          p.prevX = p.x;
          p.prevY = p.y;
          capturedCount++;
          capturedThisFrame++;
        }
      }
    }

    // === ANIMATION LOOP ===
    function animate() {
      const t = elapsed();

      // Hard clear + redraw everything each frame (no tint accumulation)
      ctx.clearRect(0, 0, W, H);

      // Phase transitions — compressed timeline (~8s to full reveal)
      if (phase === Phase.DARK && t >= 0.5) phase = Phase.SPAWN;
      if (phase === Phase.SPAWN && t >= 2) phase = Phase.CONVERGE;
      if (phase === Phase.CONVERGE && t >= 6) {
        phase = Phase.REVEAL_TITLE;
        document.getElementById('title').classList.add('visible');
      }
      if (phase === Phase.REVEAL_TITLE && t >= 7) {
        phase = Phase.REVEAL_TAGLINE;
        typeTagline();
      }
      if (phase === Phase.REVEAL_TAGLINE && t >= 8.5) phase = Phase.STEADY;

      // Spawn all particles fast
      if (phase >= Phase.SPAWN) {
        const progress = Math.min((t - 0.5) / 1.5, 1); // all particles in 1.5s
        const target = Math.floor(progress * PARTICLE_COUNT);
        for (let i = 0; i < target; i++) particles[i].alive = true;
      }

      // Capture particles + draw progress during convergence
      if (phase >= Phase.CONVERGE) {
        tryCaptureParticles();
        // Both CW and CCW progress: 0→3 each over ~4 seconds
        const convergeElapsed = t - 2;
        drawProgressCW = Math.min(convergeElapsed * 0.75, 3);
        drawProgressCCW = Math.min(convergeElapsed * 0.75, 3);
      }

      // Hex breathing — subtle scale oscillation once hex is complete
      const hexComplete = drawProgressCW >= 3 && drawProgressCCW >= 3;
      if (hexComplete) {
        resize(); // reset hexSize to base
        hexSize += Math.sin(t * 0.8) * 2 * glowScale; // ±2px breathing
      }

      // Draw hex segments FIRST (behind particles for depth)
      drawHexSegments();

      // Update and draw particles (bg layer first, then mid, then fg for depth)
      for (const p of particles) { p.update(t); }
      for (const p of particles) { if (p.layer === 'bg' && !p.captured) p.draw(); }
      for (const p of particles) { if (p.layer === 'mid' || p.captured) p.draw(); }
      for (const p of particles) { if (p.layer === 'fg' && !p.captured) p.draw(); }

      // Tagline highlight particles — orbit the tagline after steady state
      updateTaglineParticles(t);

      requestAnimationFrame(animate);
    }

    // === TAGLINE HIGHLIGHT PARTICLES ===
    // After STEADY + 3 seconds, some particles migrate to orbit around the tagline
    const taglineParticles = [];
    const TAGLINE_PARTICLE_COUNT = isMobile ? 6 : 10;
    let taglinePhaseStarted = false;

    function initTaglineParticles() {
      const taglineEl = document.getElementById('tagline');
      const rect = taglineEl.getBoundingClientRect();
      const tcx = rect.left + rect.width / 2;
      const tcy = rect.top + rect.height / 2;
      const hw = rect.width / 2 + 20;
      const hh = rect.height / 2 + 12;

      for (let i = 0; i < TAGLINE_PARTICLE_COUNT; i++) {
        taglineParticles.push({
          angle: (i / TAGLINE_PARTICLE_COUNT) * Math.PI * 2,
          speed: 0.3 + Math.random() * 0.4,
          radiusX: hw + Math.random() * 15,
          radiusY: hh + Math.random() * 10,
          size: 1 + Math.random() * 1.5,
          opacity: 0,
          noiseOff: Math.random() * 1000,
          cx: tcx, cy: tcy
        });
      }
    }

    function updateTaglineParticles(t) {
      if (phase !== Phase.STEADY) return;
      const steadyTime = t - 8.5; // time since STEADY began

      // Wait 3 seconds after steady before starting
      if (steadyTime < 3) return;

      if (!taglinePhaseStarted) {
        taglinePhaseStarted = true;
        initTaglineParticles();
      }

      const fadeIn = Math.min((steadyTime - 3) / 2, 1); // fade in over 2s

      for (const tp of taglineParticles) {
        tp.angle += tp.speed * 0.016;
        const wobbleX = Perlin.noise2D(tp.noiseOff + t * 0.4, 0) * 8;
        const wobbleY = Perlin.noise2D(0, tp.noiseOff + t * 0.4) * 5;
        const x = tp.cx + Math.cos(tp.angle) * tp.radiusX + wobbleX;
        const y = tp.cy + Math.sin(tp.angle) * tp.radiusY + wobbleY;
        tp.opacity = fadeIn * (0.4 + 0.3 * Math.sin(t * 2 + tp.noiseOff));

        ctx.save();
        ctx.shadowColor = `rgba(255,210,60,${tp.opacity * 0.6})`;
        ctx.shadowBlur = tp.size * 6;
        ctx.beginPath();
        ctx.arc(x, y, tp.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,200,50,${tp.opacity})`;
        ctx.fill();
        ctx.restore();
      }
    }

    // === SCROLL HINT — show after steady state ===
    setTimeout(() => {
      const hint = document.getElementById('scrollHint');
      if (hint) hint.classList.add('visible');
    }, 10000);

    // Hide scroll hint when user scrolls
    window.addEventListener('scroll', () => {
      const hint = document.getElementById('scrollHint');
      if (hint && window.scrollY > 50) hint.classList.remove('visible');
    }, { passive: true });

    // === MANIFESTO REVEAL — IntersectionObserver ===
    const manifestoItems = document.querySelectorAll('.manifesto-line, .repo-link');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, idx) => {
        if (entry.isIntersecting) {
          // Stagger the reveal
          setTimeout(() => entry.target.classList.add('revealed'), idx * 150);
        }
      });
    }, { threshold: 0.2 });
    manifestoItems.forEach(el => observer.observe(el));

    animate();
  </script>
</body>
</html>

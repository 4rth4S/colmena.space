<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colmena — The swarm learns where to sting.</title>
  <meta name="description" content="The swarm learns where to sting.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:title" content="Colmena">
  <meta property="og:description" content="The swarm learns where to sting.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://colmena.space">
  <meta property="og:image" content="https://colmena.space/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Google Fonts: Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --gold-dark: #D4A017;
      --amber: #FFB800;
      --bone: #F5F0E8;
      --amber-muted: #B8860B;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'Playfair Display', serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      color: var(--bone);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .title.visible {
      opacity: 1;
    }

    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--amber-muted);
      letter-spacing: 0.05em;
      margin-top: 1.2rem;
      min-height: 1.5em;
      text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
  <canvas id="swarm"></canvas>
  <div class="content">
    <h1 class="title" id="title">COLMENA</h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <script>
    // === PERLIN NOISE ===
    const Perlin = (() => {
      const permutation = [];
      for (let i = 0; i < 256; i++) permutation[i] = i;
      for (let i = 255; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
      }
      const p = [...permutation, ...permutation];
      function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      function lerp(a, b, t) { return a + t * (b - a); }
      function grad(hash, x, y) {
        const h = hash & 3;
        return (h < 2 ? x : -x) + (h === 0 || h === 3 ? y : -y);
      }
      return {
        noise2D(x, y) {
          const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
          const xf = x - Math.floor(x), yf = y - Math.floor(y);
          const u = fade(xf), v = fade(yf);
          const aa = p[p[xi] + yi], ab = p[p[xi] + yi + 1];
          const ba = p[p[xi + 1] + yi], bb = p[p[xi + 1] + yi + 1];
          return lerp(
            lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
            lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v
          );
        }
      };
    })();

    // === CANVAS SETUP ===
    const canvas = document.getElementById('swarm');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY, hexSize;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
      hexSize = Math.min(W, H) * 0.32;
    }
    resize();
    window.addEventListener('resize', resize);

    // === CONFIG ===
    const isMobile = window.innerWidth < 768;
    const PARTICLE_COUNT = isMobile ? 120 : 250;
    const TENDRIL_COUNT = isMobile ? 8 : 14;
    const MOUSE_REPEL_RADIUS = 100;

    // === PHASES ===
    const Phase = { DARK: 0, SPAWN: 1, CONVERGE: 2, REVEAL_TITLE: 3, REVEAL_TAGLINE: 4, STEADY: 5 };
    let phase = Phase.DARK;
    const startTime = performance.now();
    function elapsed() { return (performance.now() - startTime) / 1000; }

    // === MOUSE ===
    let mouseX = -9999, mouseY = -9999;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

    // === HEXAGON VERTICES ===
    function getHexVertices(size, cx, cy) {
      const verts = [];
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 2;
        verts.push({ x: cx + Math.cos(a) * size, y: cy + Math.sin(a) * size });
      }
      return verts;
    }

    // Point on hexagon perimeter (0-1 maps to full loop)
    function hexPoint(t, size, cx, cy) {
      t = ((t % 1) + 1) % 1;
      const seg = t * 6;
      const idx = Math.floor(seg);
      const frac = seg - idx;
      const verts = getHexVertices(size, cx, cy);
      const a = verts[idx % 6], b = verts[(idx + 1) % 6];
      return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
    }

    // === ENERGY TENDRILS ===
    class Tendril {
      constructor() {
        this.seed = Math.random() * 1000;
        this.angleOffset = Math.random() * Math.PI * 2;
        this.length = 0.4 + Math.random() * 0.6;
        this.speed = 0.15 + Math.random() * 0.2;
        this.width = 0.5 + Math.random() * 1;
      }
      draw(t, opacity) {
        const points = 40;
        ctx.beginPath();
        for (let i = 0; i <= points; i++) {
          const frac = i / points;
          const radius = hexSize * (0.6 + frac * this.length * 1.8);
          const baseAngle = this.angleOffset + t * this.speed;
          const noiseVal = Perlin.noise2D(this.seed + frac * 3, t * 0.4) * 1.5;
          const angle = baseAngle + noiseVal + frac * 2;
          const x = centerX + Math.cos(angle) * radius;
          const y = centerY + Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(180,140,30,${opacity * 0.08})`;
        ctx.lineWidth = this.width;
        ctx.stroke();
      }
    }

    const tendrils = [];
    for (let i = 0; i < TENDRIL_COUNT; i++) tendrils.push(new Tendril());

    // === PARTICLE ===
    class Particle {
      constructor(type) {
        this.type = type; // 'free' or 'orbit'
        this.alive = false;
        this.noiseX = Math.random() * 1000;
        this.noiseY = Math.random() * 1000;
        this.speed = 0.3 + Math.random() * 0.7;
        this.size = 1 + Math.random() * 2.5;
        this.opacity = 0.3 + Math.random() * 0.6;
        this.trail = [];
        this.maxTrail = type === 'orbit' ? 12 : 6;

        // Color: gold to amber
        const c = Math.random();
        this.r = Math.floor(200 + c * 55);
        this.g = Math.floor(150 + c * 40);
        this.b = Math.floor(15 + c * 15);

        if (type === 'orbit') {
          this.orbitPos = Math.random();
          this.orbitSpeed = 0.03 + Math.random() * 0.04;
          this.orbitOffset = (Math.random() - 0.5) * 30;
          this.x = centerX;
          this.y = centerY;
        } else {
          // Spawn from edges
          const edge = Math.floor(Math.random() * 4);
          if (edge === 0) { this.x = Math.random() * W; this.y = -10; }
          else if (edge === 1) { this.x = W + 10; this.y = Math.random() * H; }
          else if (edge === 2) { this.x = Math.random() * W; this.y = H + 10; }
          else { this.x = -10; this.y = Math.random() * H; }
        }
        this.prevX = this.x;
        this.prevY = this.y;
      }

      update(t) {
        if (!this.alive) return;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > this.maxTrail) this.trail.shift();

        this.prevX = this.x;
        this.prevY = this.y;

        if (this.type === 'orbit' && phase >= Phase.CONVERGE) {
          // Orbit along hexagon edges
          this.orbitPos += this.orbitSpeed * 0.016;
          const hp = hexPoint(this.orbitPos, hexSize, centerX, centerY);
          const nx = Perlin.noise2D(this.noiseX + t * 0.5, t * 0.3) * this.orbitOffset;
          const ny = Perlin.noise2D(this.noiseY + t * 0.5, t * 0.3) * this.orbitOffset;
          this.x = hp.x + nx;
          this.y = hp.y + ny;
        } else {
          // Free drift with Perlin noise
          const nx = Perlin.noise2D(this.noiseX + t * 0.3, this.noiseY) * 2;
          const ny = Perlin.noise2D(this.noiseY + t * 0.3, this.noiseX) * 2;
          this.x += nx * this.speed;
          this.y += ny * this.speed;

          // Attractor toward center during convergence
          if (phase >= Phase.CONVERGE) {
            const ax = centerX - this.x, ay = centerY - this.y;
            const ad = Math.sqrt(ax * ax + ay * ay);
            if (ad > 0) {
              const strength = phase === Phase.CONVERGE
                ? Math.min((elapsed() - 3) / 2, 1) * 0.8
                : 0.1;
              this.x += (ax / ad) * strength;
              this.y += (ay / ad) * strength;
              // Tangential orbit in steady state
              if (phase > Phase.CONVERGE) {
                this.x += (-ay / ad) * 0.4 * this.speed;
                this.y += (ax / ad) * 0.4 * this.speed;
              }
            }
          }
        }

        // Mouse repulsion
        const dx = this.x - mouseX, dy = this.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_REPEL_RADIUS && dist > 0) {
          const force = (MOUSE_REPEL_RADIUS - dist) / MOUSE_REPEL_RADIUS;
          this.x += (dx / dist) * force * 4;
          this.y += (dy / dist) * force * 4;
        }

        // Edge wrapping
        const m = 60;
        if (this.x < -m) this.x = W + m;
        if (this.x > W + m) this.x = -m;
        if (this.y < -m) this.y = H + m;
        if (this.y > H + m) this.y = -m;
      }

      draw() {
        if (!this.alive) return;
        const col = `${this.r},${this.g},${this.b}`;

        // Draw trail
        if (this.trail.length > 1) {
          for (let i = 1; i < this.trail.length; i++) {
            const alpha = (i / this.trail.length) * this.opacity * 0.4;
            ctx.beginPath();
            ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = `rgba(${col},${alpha})`;
            ctx.lineWidth = this.size * 0.5;
            ctx.stroke();
          }
        }

        // Particle with glow
        ctx.save();
        ctx.shadowColor = `rgba(${col},0.6)`;
        ctx.shadowBlur = this.size * 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${col},${this.opacity})`;
        ctx.fill();
        ctx.restore();
      }
    }

    // === CREATE PARTICLES ===
    const particles = [];
    const orbitCount = Math.floor(PARTICLE_COUNT * 0.35);
    const freeCount = PARTICLE_COUNT - orbitCount;
    for (let i = 0; i < freeCount; i++) particles.push(new Particle('free'));
    for (let i = 0; i < orbitCount; i++) particles.push(new Particle('orbit'));

    // === NEON HEXAGON WITH GLOW ===
    function drawHexagon(intensity) {
      // Heartbeat pulse
      const bt = elapsed() % 2.4;
      let beat = 0;
      if (bt < 0.15) beat = bt / 0.15;
      else if (bt < 0.3) beat = 1 - (bt - 0.15) / 0.15;
      else if (bt < 0.5) beat = (bt - 0.3) / 0.2;
      else if (bt < 0.8) beat = 1 - (bt - 0.5) / 0.3;
      const glow = intensity * (0.4 + 0.6 * beat);

      ctx.save();
      ctx.translate(centerX, centerY);

      // Build path
      function hexPath() {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i - Math.PI / 2;
          const x = Math.cos(a) * hexSize;
          const y = Math.sin(a) * hexSize;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
      }

      // Layer 1: wide outer glow
      hexPath();
      ctx.shadowColor = `rgba(255,190,0,${glow * 0.5})`;
      ctx.shadowBlur = 60;
      ctx.strokeStyle = `rgba(212,160,23,${glow * 0.15})`;
      ctx.lineWidth = 8;
      ctx.stroke();

      // Layer 2: medium glow
      hexPath();
      ctx.shadowColor = `rgba(255,200,50,${glow * 0.7})`;
      ctx.shadowBlur = 30;
      ctx.strokeStyle = `rgba(230,180,40,${glow * 0.4})`;
      ctx.lineWidth = 4;
      ctx.stroke();

      // Layer 3: bright core line
      hexPath();
      ctx.shadowColor = `rgba(255,220,100,${glow})`;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = `rgba(255,210,60,${glow * 0.9})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.restore();
    }

    // === TAGLINE TYPEWRITER ===
    function typeTagline() {
      const text = 'The swarm learns where to sting.';
      const el = document.getElementById('tagline');
      let i = 0;
      const interval = setInterval(() => {
        el.textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 50);
    }

    // === ANIMATION LOOP ===
    function animate() {
      const t = elapsed();

      // Soft fade — trail persistence
      ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
      ctx.fillRect(0, 0, W, H);

      // Phase transitions
      if (phase === Phase.DARK && t >= 1.5) phase = Phase.SPAWN;
      if (phase === Phase.SPAWN && t >= 3.5) phase = Phase.CONVERGE;
      if (phase === Phase.CONVERGE && t >= 5.5) {
        phase = Phase.REVEAL_TITLE;
        document.getElementById('title').classList.add('visible');
      }
      if (phase === Phase.REVEAL_TITLE && t >= 6.5) {
        phase = Phase.REVEAL_TAGLINE;
        typeTagline();
      }
      if (phase === Phase.REVEAL_TAGLINE && t >= 8) phase = Phase.STEADY;

      // Spawn free particles gradually
      if (phase >= Phase.SPAWN) {
        const progress = Math.min((t - 1.5) / 2, 1);
        const target = Math.floor(progress * freeCount);
        for (let i = 0; i < target; i++) particles[i].alive = true;
      }

      // Spawn orbit particles during convergence
      if (phase >= Phase.CONVERGE) {
        const progress = Math.min((t - 3.5) / 2, 1);
        const target = Math.floor(progress * orbitCount);
        for (let i = 0; i < target; i++) particles[freeCount + i].alive = true;
      }

      // Draw tendrils (behind everything)
      if (phase >= Phase.CONVERGE) {
        const tendrilOpacity = Math.min((t - 3.5) / 2, 1);
        for (const td of tendrils) td.draw(t, tendrilOpacity);
      }

      // Update and draw particles
      for (const p of particles) {
        p.update(t);
        p.draw();
      }

      // Hexagon — grows in intensity as particles arrive
      if (phase >= Phase.CONVERGE) {
        const hexIntensity = Math.min((t - 3.5) / 2.5, 1);
        drawHexagon(hexIntensity);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colmena — El enjambre aprende donde picar.</title>
  <meta name="description" content="Something is being built. The swarm learns where to sting.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:title" content="Colmena">
  <meta property="og:description" content="El enjambre aprende donde picar.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://colmena.space">
  <meta property="og:image" content="https://colmena.space/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Google Fonts: Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --gold-dark: #D4A017;
      --amber: #FFB800;
      --bone: #F5F0E8;
      --amber-muted: #B8860B;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'Playfair Display', serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      color: var(--bone);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .title.visible {
      opacity: 1;
    }

    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--amber-muted);
      letter-spacing: 0.05em;
      margin-top: 1.2rem;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <canvas id="swarm"></canvas>
  <div class="content">
    <h1 class="title" id="title">COLMENA</h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <script>
    // JS will be added in subsequent tasks
  </script>
</body>
</html>

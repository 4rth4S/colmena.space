<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colmena — The swarm learns where to sting.</title>
  <meta name="description" content="The swarm learns where to sting.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:title" content="Colmena">
  <meta property="og:description" content="The swarm learns where to sting.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://colmena.space">
  <meta property="og:image" content="https://colmena.space/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Google Fonts: Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --gold-dark: #D4A017;
      --amber: #FFB800;
      --bone: #F5F0E8;
      --amber-muted: #B8860B;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'Playfair Display', serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      color: var(--bone);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .title.visible {
      opacity: 1;
    }

    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--amber-muted);
      letter-spacing: 0.05em;
      margin-top: 1.2rem;
      min-height: 1.5em;
      text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
  <canvas id="swarm"></canvas>
  <div class="content">
    <h1 class="title" id="title">COLMENA</h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <script>
    // === PERLIN NOISE ===
    const Perlin = (() => {
      const permutation = [];
      for (let i = 0; i < 256; i++) permutation[i] = i;
      for (let i = 255; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
      }
      const p = [...permutation, ...permutation];

      function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      function lerp(a, b, t) { return a + t * (b - a); }
      function grad(hash, x, y) {
        const h = hash & 3;
        const u = h < 2 ? x : -x;
        const v = h === 0 || h === 3 ? y : -y;
        return u + v;
      }

      return {
        noise2D(x, y) {
          const xi = Math.floor(x) & 255;
          const yi = Math.floor(y) & 255;
          const xf = x - Math.floor(x);
          const yf = y - Math.floor(y);
          const u = fade(xf);
          const v = fade(yf);
          const aa = p[p[xi] + yi];
          const ab = p[p[xi] + yi + 1];
          const ba = p[p[xi + 1] + yi];
          const bb = p[p[xi + 1] + yi + 1];
          return lerp(
            lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
            lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u),
            v
          );
        }
      };
    })();

    // === CANVAS SETUP ===
    const canvas = document.getElementById('swarm');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // === CONFIG ===
    const isMobile = window.innerWidth < 768;
    const PARTICLE_COUNT = isMobile ? 100 : 180;
    const MOUSE_REPEL_RADIUS = 80;

    // === ANIMATION PHASES ===
    const Phase = { DARK: 0, SPAWN: 1, CONVERGE: 2, REVEAL_TITLE: 3, REVEAL_TAGLINE: 4, STEADY: 5 };
    let phase = Phase.DARK;
    let startTime = performance.now();
    function elapsed() { return (performance.now() - startTime) / 1000; }

    // === MOUSE TRACKING ===
    let mouseX = -9999, mouseY = -9999;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

    // === PARTICLE ===
    class Particle {
      constructor() {
        // Spawn from a random edge
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0) { this.x = Math.random() * W; this.y = -10; }
        else if (edge === 1) { this.x = W + 10; this.y = Math.random() * H; }
        else if (edge === 2) { this.x = Math.random() * W; this.y = H + 10; }
        else { this.x = -10; this.y = Math.random() * H; }

        this.baseSize = 1 + Math.random() * 2;
        this.size = this.baseSize;
        this.opacity = 0.3 + Math.random() * 0.5;
        this.noiseOffsetX = Math.random() * 1000;
        this.noiseOffsetY = Math.random() * 1000;
        this.speed = 0.3 + Math.random() * 0.7;

        // Gold-to-amber color
        const t = Math.random();
        const r = Math.floor(212 + t * 43);
        const g = Math.floor(160 + t * 24);
        const b = Math.floor(23 + t * 0);
        this.color = `${r},${g},${b}`;

        // Trail
        this.prevX = this.x;
        this.prevY = this.y;

        this.alive = false;
      }

      update(t) {
        if (!this.alive) return;

        this.prevX = this.x;
        this.prevY = this.y;

        // Perlin noise drift
        const nx = Perlin.noise2D(this.noiseOffsetX + t * 0.3, this.noiseOffsetY) * 2;
        const ny = Perlin.noise2D(this.noiseOffsetY + t * 0.3, this.noiseOffsetX) * 2;

        this.x += nx * this.speed;
        this.y += ny * this.speed;

        // Central attractor — activates during CONVERGE phase and stays active
        if (phase >= Phase.CONVERGE) {
          const ax = centerX - this.x;
          const ay = centerY - this.y;
          const aDist = Math.sqrt(ax * ax + ay * ay);
          if (aDist > 0) {
            let attractStrength;
            if (phase === Phase.CONVERGE) {
              const convergeT = Math.min((elapsed() - 3) / 1.5, 1);
              attractStrength = convergeT * 1.2;
            } else {
              // Orbital: weaker pull + tangential drift keeps particles circling
              attractStrength = 0.15;
              const tangentX = -ay / aDist * 0.5 * this.speed;
              const tangentY = ax / aDist * 0.5 * this.speed;
              this.x += tangentX;
              this.y += tangentY;
            }
            this.x += (ax / aDist) * attractStrength;
            this.y += (ay / aDist) * attractStrength;
          }
        }

        // Mouse repulsion
        const dx = this.x - mouseX;
        const dy = this.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_REPEL_RADIUS && dist > 0) {
          const force = (MOUSE_REPEL_RADIUS - dist) / MOUSE_REPEL_RADIUS;
          this.x += (dx / dist) * force * 3;
          this.y += (dy / dist) * force * 3;
        }

        // Soft edge wrapping
        const margin = 50;
        if (this.x < -margin) this.x = W + margin;
        if (this.x > W + margin) this.x = -margin;
        if (this.y < -margin) this.y = H + margin;
        if (this.y > H + margin) this.y = -margin;
      }

      draw() {
        if (!this.alive) return;

        // Trail line (during and after convergence)
        if (phase >= Phase.CONVERGE) {
          const dx = this.x - this.prevX;
          const dy = this.y - this.prevY;
          const trailLen = Math.sqrt(dx * dx + dy * dy);
          if (trailLen > 1) {
            ctx.beginPath();
            ctx.moveTo(this.prevX, this.prevY);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `rgba(${this.color},${this.opacity * 0.3})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }

        // Particle dot
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
        ctx.fill();

        // Glow effect on larger particles
        if (this.size > 2) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.color},${this.opacity * 0.08})`;
          ctx.fill();
        }
      }
    }

    // === CREATE PARTICLES ===
    const particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    // === HEXAGON ===
    function drawHexagon(opacity) {
      const size = Math.min(W, H) * 0.45;
      // Heartbeat: quick double-pulse then rest
      const t = elapsed() % 2.4; // cycle every 2.4s
      let beat = 0;
      if (t < 0.15) beat = t / 0.15;              // first beat up
      else if (t < 0.3) beat = 1 - (t - 0.15) / 0.15; // first beat down
      else if (t < 0.5) beat = (t - 0.3) / 0.2;       // second beat up
      else if (t < 0.8) beat = 1 - (t - 0.5) / 0.3;   // second beat down
      else beat = 0;                                     // rest
      opacity = opacity * 0.3 + opacity * 0.7 * beat;
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const x = Math.cos(angle) * size;
        const y = Math.sin(angle) * size;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = `rgba(212,160,23,${opacity})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    // === TAGLINE TYPEWRITER ===
    function typeTagline() {
      const text = 'The swarm learns where to sting.';
      const el = document.getElementById('tagline');
      let i = 0;
      const interval = setInterval(() => {
        el.textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 50);
    }

    // === ANIMATION LOOP ===
    function animate() {
      const t = elapsed();

      // Soft fade for trail persistence (bloom effect)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, W, H);

      // Phase transitions
      if (phase === Phase.DARK && t >= 1.5) {
        phase = Phase.SPAWN;
      }
      if (phase === Phase.SPAWN && t >= 3) {
        phase = Phase.CONVERGE;
      }
      if (phase === Phase.CONVERGE && t >= 4.5) {
        phase = Phase.REVEAL_TITLE;
        document.getElementById('title').classList.add('visible');
      }
      if (phase === Phase.REVEAL_TITLE && t >= 5.5) {
        phase = Phase.REVEAL_TAGLINE;
        typeTagline();
      }
      if (phase === Phase.REVEAL_TAGLINE && t >= 6.5) {
        phase = Phase.STEADY;
      }

      // Spawn particles gradually during SPAWN phase
      if (phase >= Phase.SPAWN) {
        const spawnProgress = Math.min((t - 1.5) / 1.5, 1);
        const targetAlive = Math.floor(spawnProgress * PARTICLE_COUNT);
        for (let i = 0; i < targetAlive; i++) {
          particles[i].alive = true;
        }
      }

      // Update and draw particles
      for (const p of particles) {
        p.update(t);
        p.draw();
      }

      // Draw hexagon during and after convergence
      if (phase >= Phase.CONVERGE) {
        const hexOpacity = Math.min((t - 3) / 1.5, 0.35);
        drawHexagon(hexOpacity);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
